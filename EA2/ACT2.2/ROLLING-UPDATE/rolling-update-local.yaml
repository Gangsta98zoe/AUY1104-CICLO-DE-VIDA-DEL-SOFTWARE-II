apiVersion: apps/v1
kind: Deployment
metadata:
  name: duoc-app-deployment
  labels:
    app: duoc-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: duoc-app
  template:
    metadata:
      labels:
        app: duoc-app
    spec:
      containers:
      - name: node-app-container
        image: duoc-lab:v1.0
        ports:
        - containerPort: 3000
        imagePullPolicy: Never
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
---
apiVersion: v1
kind: Service
metadata:
  name: duoc-app-service
  labels:
    app: duoc-app
spec:
  selector:
    app: duoc-app
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30001
